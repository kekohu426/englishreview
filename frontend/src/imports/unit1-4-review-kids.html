<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit 1-4 英语复习闯关</title>
  <style>
    :root {
      --paper: #fff9ea;
      --paper-strong: #fff1bf;
      --ink: #213044;
      --muted: #6c7480;
      --line: #e7dcc4;
      --blue: #3167d8;
      --green: #1f9d67;
      --red: #e04b4b;
      --orange: #f28a3c;
      --teal: #2ca6a4;
      --shadow: 0 14px 34px rgba(33, 48, 68, 0.13);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Trebuchet MS", "Microsoft YaHei", "PingFang SC", sans-serif;
      letter-spacing: 0;
    }

    body {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.38) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,0.38) 1px, transparent 1px),
        var(--paper);
      background-size: 24px 24px;
      padding: 18px;
    }

    button {
      font: inherit;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 0 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #ffe070;
      box-shadow: 5px 5px 0 var(--ink);
      font-size: 28px;
      flex: 0 0 auto;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.05;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 5px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .icon-btn,
    .text-btn {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      color: var(--ink);
      background: #fff;
      min-height: 44px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }

    .icon-btn {
      width: 48px;
      display: grid;
      place-items: center;
      font-size: 21px;
    }

    .text-btn {
      padding: 0 14px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .icon-btn:hover,
    .text-btn:hover,
    .option:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--ink);
    }

    .icon-btn:active,
    .text-btn:active,
    .option:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.95fr);
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .mission {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 20px;
      display: grid;
      gap: 14px;
      min-height: 260px;
    }

    .mission-title {
      font-size: clamp(24px, 5vw, 48px);
      line-height: 1.02;
      max-width: 9ch;
    }

    .mission-copy {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      max-width: 42ch;
    }

    .mission-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 7px 10px;
      background: var(--paper-strong);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .start-btn {
      justify-self: start;
      align-self: end;
      min-width: 168px;
      background: var(--green);
      color: #fff;
    }

    .progress-board {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #d7f0ff;
      padding: 18px;
      box-shadow: 7px 7px 0 var(--ink);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      min-height: 260px;
    }

    .progress-face {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
    }

    .mascot {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: #fff;
      font-size: 42px;
    }

    .big-number {
      font-size: 34px;
      font-weight: 900;
    }

    .track {
      height: 14px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }

    .track-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), #ffd45a, var(--orange));
      transition: width 0.35s ease;
    }

    .module-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .module-card {
      min-height: 190px;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 5px 5px 0 rgba(33, 48, 68, 0.92);
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 9px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      text-align: left;
    }

    .module-card:hover {
      transform: translateY(-3px);
      box-shadow: 7px 8px 0 rgba(33, 48, 68, 0.92);
    }

    .module-card.done {
      background: #ebfff2;
    }

    .module-card .module-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .module-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: var(--paper-strong);
      font-size: 24px;
    }

    .module-status {
      font-size: 12px;
      font-weight: 900;
      color: #fff;
      background: var(--blue);
      padding: 5px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .module-card.done .module-status {
      background: var(--green);
    }

    .module-name {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 900;
    }

    .module-goal {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .module-meta {
      display: flex;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .lesson-shell {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .lesson-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
      background: #ffe070;
      border-bottom: 3px solid var(--ink);
    }

    .lesson-title {
      font-size: 22px;
      font-weight: 900;
    }

    .lesson-goal {
      margin-top: 4px;
      color: #4a4a4a;
      font-size: 14px;
    }

    .lesson-progress {
      min-width: 132px;
      text-align: right;
      font-weight: 900;
      color: var(--ink);
    }

    .lesson-body {
      display: grid;
      gap: 18px;
      padding: 20px;
      min-height: 460px;
      padding-bottom: 156px;
    }

    .question-zone {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .question-kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .type-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #e7fff6;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .question-title {
      font-size: clamp(24px, 5vw, 42px);
      line-height: 1.12;
      font-weight: 900;
    }

    .question-subtitle {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .audio-panel {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      max-width: 540px;
    }

    .sound-btn {
      width: 92px;
      height: 92px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 5px 5px 0 var(--ink);
      font-size: 38px;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .sound-btn.playing {
      animation: popSound 0.65s ease-in-out infinite;
    }

    .sound-btn.recording {
      background: var(--red);
      animation: recordPulse 0.75s ease-in-out infinite;
    }

    @keyframes popSound {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    @keyframes recordPulse {
      0%,
      100% {
        transform: scale(1);
        box-shadow: 5px 5px 0 var(--ink), 0 0 0 0 rgba(224, 75, 75, 0.28);
      }
      50% {
        transform: scale(1.08);
        box-shadow: 5px 5px 0 var(--ink), 0 0 0 18px rgba(224, 75, 75, 0);
      }
    }

    .sound-label {
      display: grid;
      gap: 5px;
    }

    .sound-label strong {
      font-size: 22px;
    }

    .sound-label span {
      color: var(--muted);
      line-height: 1.4;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .options.two {
      grid-template-columns: repeat(2, minmax(0, 180px));
    }

    .option {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      min-height: 132px;
      padding: 14px;
      cursor: pointer;
      display: grid;
      place-items: center;
      gap: 10px;
      text-align: center;
      box-shadow: 4px 4px 0 var(--ink);
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
      overflow-wrap: anywhere;
    }

    .option.has-visual {
      min-height: 226px;
      grid-template-rows: auto 1fr;
      align-content: stretch;
    }

    .option.text-only .answer {
      font-size: clamp(22px, 3vw, 34px);
    }

    .option .picture {
      font-size: 76px;
      line-height: 1;
    }

    .visual-card {
      width: min(148px, 100%);
      aspect-ratio: 1;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff7d6;
      display: grid;
      place-items: center;
      box-shadow: 3px 3px 0 rgba(33, 48, 68, 0.8);
      overflow: hidden;
    }

    .visual-card svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .visual-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .visual-card.placeholder .picture {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 900;
    }

    .option .answer {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.2;
    }

    .option .answer small {
      display: block;
      font-size: 15px;
      color: var(--muted);
      margin-top: 4px;
    }

    .word-main {
      display: block;
      color: var(--ink);
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 900;
      line-height: 0.98;
      text-transform: uppercase;
    }

    .word-sub {
      display: block;
      color: var(--blue);
      font-size: clamp(20px, 2.6vw, 30px);
      font-weight: 900;
      margin-top: 3px;
    }

    .translation {
      display: block;
      color: var(--muted);
      font-size: 17px;
      margin-top: 4px;
    }

    .option.locked {
      pointer-events: none;
    }

    .option.correct {
      background: #dff9e9;
      border-color: var(--green);
      animation: correctPop 0.45s ease;
    }

    .option.wrong {
      background: #ffe5e5;
      border-color: var(--red);
      animation: wrongShake 0.42s ease;
    }

    @keyframes correctPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.04) rotate(-1deg); }
      100% { transform: scale(1); }
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .focus-word {
      animation: wordGlow 0.85s ease;
    }

    @keyframes wordGlow {
      0%, 100% { transform: scale(1); color: var(--ink); }
      45% { transform: scale(1.12); color: var(--green); }
    }

    .letter-card {
      display: grid;
      grid-template-columns: minmax(160px, 220px) minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      max-width: 760px;
    }

    .letter-stage {
      aspect-ratio: 1;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff4cc;
      display: grid;
      place-items: center;
      box-shadow: 5px 5px 0 var(--ink);
      font-size: clamp(72px, 16vw, 150px);
      font-weight: 900;
    }

    .writing-board {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background:
        repeating-linear-gradient(
          to bottom,
          #fff 0,
          #fff 30px,
          #d7e6ff 31px,
          #fff 32px,
          #fff 62px,
          #f2c7c7 63px
        );
      min-height: 148px;
      padding: 14px;
      display: grid;
      align-content: center;
      gap: 8px;
    }

    .trace-text {
      font-size: clamp(48px, 10vw, 86px);
      font-weight: 900;
      color: rgba(33, 48, 68, 0.24);
      line-height: 1;
    }

    .completion-panel {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #e7fff6;
      min-height: 360px;
      padding: 26px;
      display: grid;
      gap: 16px;
      align-content: center;
      justify-items: center;
      text-align: center;
    }

    .completion-panel .big-emoji {
      font-size: 68px;
    }

    .completion-panel h2 {
      font-size: clamp(30px, 5vw, 48px);
    }

    .completion-panel p {
      color: var(--muted);
      line-height: 1.5;
      max-width: 42ch;
    }

    .feedback {
      min-height: 86px;
      border: 3px solid transparent;
      border-radius: var(--radius);
      padding: 14px 16px;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .feedback.show {
      display: flex;
    }

    .feedback.good {
      border-color: var(--green);
      background: #e7fff1;
    }

    .feedback.try {
      border-color: var(--red);
      background: #fff0f0;
    }

    .feedback-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .mini-btn {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      min-height: 34px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .feedback-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: #fff;
      flex: 0 0 auto;
      font-size: 24px;
    }

    .feedback-copy {
      display: grid;
      gap: 4px;
    }

    .feedback-copy strong {
      font-size: 18px;
    }

    .feedback-copy span {
      color: var(--muted);
      line-height: 1.45;
    }

    .read-card {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff7d6;
      padding: 18px;
      box-shadow: 5px 5px 0 rgba(33, 48, 68, 0.88);
      display: grid;
      gap: 10px;
      max-width: 760px;
    }

    .dubbing-stage {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 6px 6px 0 rgba(33, 48, 68, 0.88);
      overflow: hidden;
      max-width: 820px;
    }

    .scene-art {
      min-height: 250px;
      display: grid;
      place-items: center;
      background: #d7f0ff;
      border-bottom: 3px solid var(--ink);
    }

    .scene-art svg {
      width: 100%;
      max-width: 760px;
      height: 250px;
      display: block;
    }

    .caption-strip {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      padding: 16px;
      background: #fff7d6;
    }

    .role-avatar {
      width: 72px;
      height: 72px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: #ffe070;
      display: grid;
      place-items: center;
      font-size: 38px;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .speech-bubble {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px 16px;
      position: relative;
    }

    .speech-bubble::before {
      content: "";
      position: absolute;
      left: -14px;
      top: 24px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-left: 3px solid var(--ink);
      border-bottom: 3px solid var(--ink);
      transform: rotate(45deg);
    }

    .subtitle-line {
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 900;
      line-height: 1.05;
    }

    .dubbing-zone {
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
      gap: 14px;
    }

    .dubbing-shell {
      border: 4px solid var(--ink);
      border-radius: 22px;
      background: #f8f2e6;
      box-shadow: 8px 8px 0 rgba(33, 48, 68, 0.88);
      overflow: hidden;
    }

    .dubbing-screen {
      position: relative;
      min-height: 360px;
      background: #d7f0ff;
      overflow: hidden;
    }

    .dubbing-screen .scene-art {
      min-height: 360px;
      height: 100%;
      border: 0;
    }

    .dubbing-screen .scene-art svg {
      width: 100%;
      max-width: none;
      height: 360px;
    }

    .caption-overlay {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 20px;
      display: grid;
      gap: 10px;
    }

    .caption-main {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      border: 3px solid var(--ink);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      padding: 16px 18px;
      box-shadow: 5px 5px 0 rgba(33, 48, 68, 0.82);
      backdrop-filter: blur(4px);
    }

    .role-chip {
      min-width: 72px;
      height: 72px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: #ffe070;
      display: grid;
      place-items: center;
      font-size: 36px;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .caption-text {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .caption-line {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .caption-text .subtitle-line {
      font-size: clamp(38px, 5.2vw, 60px);
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .caption-tools {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .caption-translation {
      color: #58606f;
      font-size: 17px;
      font-weight: 800;
    }

    .caption-focus {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .caption-focus .focus-chip {
      background: #fff7d6;
      padding: 5px 9px;
      font-size: 15px;
    }

    .dub-console {
      display: grid;
      justify-content: center;
      align-items: center;
      padding: 22px 28px 24px;
      background: #fffaf0;
      border-top: 4px solid #cfd8e8;
    }

    .dub-side-btn {
      min-height: 40px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      box-shadow: 2px 2px 0 var(--ink);
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
      padding: 0 12px;
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }

    .dub-side-btn.playing {
      background: #fff7d6;
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .dub-side-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .dub-side-btn:not(:disabled):active,
    .record-orb:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    .dub-console .record-orb {
      width: 148px;
      height: 148px;
      font-size: 58px;
      box-shadow: 6px 7px 0 var(--ink);
    }

    .record-main {
      display: grid;
      justify-items: center;
      gap: 10px;
      min-width: 170px;
    }

    .record-helper {
      display: grid;
      justify-items: center;
      gap: 3px;
      text-align: center;
      min-height: 46px;
    }

    .record-helper strong {
      color: var(--ink);
      font-size: 19px;
      font-weight: 900;
      line-height: 1.15;
    }

    .record-helper .wave {
      display: none;
      margin-top: 2px;
    }

    .record-helper .wave.active {
      display: flex;
    }

    .dub-playback-btn {
      min-width: 66px;
      min-height: 40px;
      font-size: 15px;
    }

    .dub-hint {
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
    }

    .dubbing-zone .score-card {
      max-width: none;
      border-radius: 22px;
      padding: 18px 20px 20px;
      box-shadow: 5px 5px 0 rgba(33, 48, 68, 0.86);
    }

    .dub-steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      max-width: 820px;
    }

    .dub-step {
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      padding: 7px 9px;
      text-align: center;
      font-size: 13px;
      font-weight: 900;
    }

    .dub-step.active {
      background: var(--paper-strong);
      color: var(--blue);
    }

    .read-card .target-line {
      font-size: clamp(36px, 6vw, 68px);
      font-weight: 900;
      line-height: 1.02;
    }

    .focus-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .focus-chip {
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff;
      padding: 6px 10px;
      color: var(--blue);
      font-weight: 900;
    }

    .record-panel {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #e7f6ff;
      padding: 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      max-width: 760px;
    }

    .record-orb {
      width: 96px;
      height: 96px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 5px 5px 0 var(--ink);
      font-size: 38px;
      cursor: pointer;
    }

    .record-orb:disabled {
      cursor: default;
    }

    .record-orb.recording {
      background: var(--red);
      animation: recordPulse 0.75s ease-in-out infinite;
    }

    .record-orb.countdown {
      background: var(--orange);
      font-size: 48px;
      animation: correctPop 0.5s ease-in-out infinite;
    }

    .record-copy {
      display: grid;
      gap: 8px;
    }

    .wave {
      height: 42px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .wave span {
      width: 9px;
      height: 12px;
      border-radius: 999px;
      background: var(--blue);
      opacity: 0.36;
    }

    .wave.active span {
      animation: waveMove 0.74s ease-in-out infinite;
    }

    .wave span:nth-child(2) { animation-delay: 0.1s; }
    .wave span:nth-child(3) { animation-delay: 0.2s; }
    .wave span:nth-child(4) { animation-delay: 0.3s; }
    .wave span:nth-child(5) { animation-delay: 0.4s; }

    @keyframes waveMove {
      0%, 100% { height: 10px; opacity: 0.34; }
      50% { height: 38px; opacity: 1; }
    }

    .record-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .score-card {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      max-width: 760px;
      display: none;
      gap: 10px;
    }

    .score-card.show {
      display: grid;
      animation: scoreRise 0.28s ease-out both;
    }

    .score-card.scoring .score-badge {
      background: #fff7d6;
    }

    .score-card.scoring .score-meter-fill {
      background: linear-gradient(90deg, #54a3ff, #ffd45a, #54a3ff);
      background-size: 200% 100%;
      animation: scoringMove 1.1s linear infinite;
    }

    @keyframes scoreRise {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes scoringMove {
      from { background-position: 0 0; }
      to { background-position: 200% 0; }
    }

    .score-top {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
    }

    .score-badge {
      width: 136px;
      height: 136px;
      border: 4px solid var(--ink);
      border-radius: 50%;
      background: #dff9e9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      box-shadow: 5px 5px 0 rgba(33, 48, 68, 0.86);
    }

    .score-badge span {
      align-self: flex-end;
      padding-bottom: 28px;
      font-size: 21px;
      font-weight: 900;
      color: var(--green);
    }

    .score-copy {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .score-label {
      width: max-content;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #fff7d6;
      padding: 6px 12px;
      color: #42526b;
      font-weight: 900;
    }

    .score-headline {
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.1;
      font-weight: 900;
    }

    .score-number {
      font-size: clamp(44px, 7vw, 78px);
      font-weight: 900;
      color: var(--green);
      line-height: 1;
    }

    .stars {
      color: #f2a900;
      font-size: 28px;
      letter-spacing: 0;
    }

    .score-meter {
      height: 16px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: #f2f2f2;
      overflow: hidden;
    }

    .score-meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), #ffd45a, var(--green));
      transition: width 0.5s ease;
    }

    .kid-score-message {
      border: 3px solid var(--ink);
      border-radius: 18px;
      background: #fff7d6;
      padding: 14px 16px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.35;
      color: var(--ink);
    }

    .score-details {
      border: 2px solid #cfd8e8;
      border-radius: 16px;
      background: #f8fbff;
      padding: 10px 12px;
    }

    .score-details summary {
      cursor: pointer;
      font-weight: 900;
      color: #42526b;
    }

    .score-details .question-subtitle {
      margin-top: 8px;
    }

    .mic-diagnostic {
      display: none;
      border: 2px solid var(--ink);
      border-radius: 16px;
      padding: 10px 12px;
      background: #f6f6f6;
      gap: 4px;
      color: var(--ink);
    }

    .mic-diagnostic.good,
    .mic-diagnostic.warn,
    .mic-diagnostic.bad {
      display: grid;
    }

    .mic-diagnostic.good {
      background: #dff9e9;
    }

    .mic-diagnostic.warn {
      background: #fff1bf;
    }

    .mic-diagnostic.bad {
      background: #ffe5e5;
    }

    .mic-diagnostic strong {
      font-size: 18px;
      font-weight: 900;
    }

    .mic-diagnostic span,
    .mic-diagnostic small {
      font-weight: 800;
    }

    .mic-diagnostic small {
      color: var(--muted);
    }

    .mic-device-panel {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
      border: 2px solid var(--ink);
      border-radius: 14px;
      background: #fffdf5;
      padding: 10px 12px;
    }

    .mic-device-panel[hidden] {
      display: none;
    }

    .mic-device-panel label {
      display: grid;
      gap: 6px;
      color: var(--ink);
      font-weight: 900;
    }

    .mic-device-panel select {
      min-height: 42px;
      border: 2px solid var(--ink);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
      padding: 0 10px;
    }

    .mic-device-panel small,
    .mic-input-warning {
      color: #bd1d1d;
      font-weight: 900;
    }

    .word-score-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .word-score-legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      box-shadow: 0 2px 0 rgba(0, 0, 0, .12);
    }

    .legend-dot.good {
      background: #20b45b;
    }

    .legend-dot.ok {
      background: #ffd33d;
    }

    .legend-dot.practice {
      background: #ff5b5b;
    }

    .word-token {
      border: 2px solid var(--ink);
      border-radius: 14px;
      padding: 10px 13px;
      background: #f4f6fb;
      font-size: 22px;
      font-weight: 900;
      min-width: 54px;
      text-align: center;
    }

    .word-token.good {
      background: #dff9e9;
      border-color: #20a957;
      color: #11753a;
    }

    .word-token.ok {
      background: #fff1bf;
      border-color: #e0a900;
      color: #8a6100;
    }

    .word-token.miss {
      background: #ffe5e5;
      border-color: #f14f4f;
      color: #bd1d1d;
    }

    .word-token.practice {
      background: #ffe5e5;
      border-color: #f14f4f;
      color: #bd1d1d;
    }

    .word-token.unheard {
      background: #ffe5e5;
      border-color: #f14f4f;
      color: #bd1d1d;
    }

    .lesson-actions {
      position: sticky;
      bottom: 10px;
      z-index: 50;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      padding: 16px 20px 20px;
      margin: 0 20px 20px;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fffdf5;
      box-shadow: 5px 5px 0 rgba(33, 48, 68, 0.88), 0 -8px 18px rgba(33, 48, 68, 0.12);
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    .lesson-shell.complete .lesson-body {
      padding-bottom: 20px;
    }

    .lesson-shell.complete .lesson-actions {
      display: none;
    }

    .primary {
      background: var(--blue);
      color: #fff;
    }

    .success {
      background: var(--green);
      color: #fff;
    }

    .ghost {
      background: #fff;
    }

    .text-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .coverage-panel {
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .parent-check {
      margin-top: 16px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fffdf5;
      padding: 12px;
    }

    .parent-check summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 900;
      list-style-position: inside;
    }

    .coverage-head {
      padding: 13px 16px;
      background: #e7fff6;
      border-bottom: 3px solid var(--ink);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .coverage-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
    }

    .coverage-item {
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      display: grid;
      gap: 5px;
    }

    .coverage-item strong {
      font-size: 14px;
    }

    .coverage-item span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .award {
      border: 4px double var(--ink);
      border-radius: var(--radius);
      background: #fff;
      max-width: 680px;
      margin: 24px auto;
      padding: 26px;
      box-shadow: 8px 8px 0 var(--ink);
      text-align: center;
      display: grid;
      gap: 12px;
    }

    .award .seal {
      width: 92px;
      height: 92px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: #ffe070;
      font-size: 48px;
    }

    .award h2 {
      font-size: clamp(32px, 6vw, 54px);
    }

    .award p {
      color: var(--muted);
      line-height: 1.55;
      font-size: 17px;
    }

    .confetti {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 20;
    }

    .confetti i {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 16px;
      background: var(--orange);
      animation: fall 1.4s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(calc(100vh + 40px)) rotate(240deg);
      }
    }

    @media (min-width: 761px) and (max-height: 760px) {
      body {
        padding-top: 10px;
      }

      .topbar {
        padding: 8px 0 10px;
      }

      h1 {
        font-size: clamp(24px, 3vw, 34px);
      }

      .brand-mark {
        width: 48px;
        height: 48px;
        font-size: 25px;
      }

      .lesson-head {
        padding: 12px 16px;
      }

      .lesson-body {
        padding: 14px;
        padding-bottom: 156px;
        min-height: 390px;
      }

      .dubbing-zone {
        gap: 10px;
      }

      .dubbing-screen {
        min-height: 265px;
      }

      .dubbing-screen .scene-art {
        min-height: 265px;
      }

      .dubbing-screen .scene-art svg {
        height: 265px;
      }

      .caption-overlay {
        bottom: 12px;
      }

      .caption-main {
        padding: 10px 14px;
      }

      .caption-text .subtitle-line {
        font-size: clamp(34px, 4.2vw, 48px);
      }

      .dub-console {
        padding: 14px 20px 14px;
      }

      .dub-console .record-orb {
        width: 112px;
        height: 112px;
        font-size: 44px;
      }

      .record-helper strong {
        font-size: 17px;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
        overflow-x: hidden;
      }

      .topbar,
      .hero,
      .lesson-head,
      .letter-card {
        grid-template-columns: 1fr;
      }

      .top-actions {
        display: flex;
        justify-content: stretch;
        width: 100%;
        min-width: 0;
      }

      .top-actions .text-btn {
        flex: 1 1 0;
        min-width: 0;
      }

      .top-actions .icon-btn {
        flex: 0 0 48px;
      }

      .module-card,
      .mission,
      .progress-board,
      .lesson-shell {
        box-shadow: 4px 4px 0 rgba(33, 48, 68, 0.92);
        width: calc(100% - 5px);
      }

      .module-card .module-top {
        justify-content: flex-start;
      }

      .module-card {
        min-height: 116px;
        grid-template-columns: auto 1fr auto;
        grid-template-rows: auto auto;
        align-items: center;
        gap: 7px 10px;
        padding: 12px;
      }

      .module-card .module-top {
        display: contents;
      }

      .module-icon {
        width: 48px;
        height: 48px;
        grid-column: 1;
        grid-row: 1 / 3;
      }

      .module-status {
        grid-column: 3;
        grid-row: 1;
        align-self: start;
      }

      .module-name {
        grid-column: 2;
        grid-row: 1;
        font-size: 17px;
      }

      .module-goal {
        grid-column: 2 / 4;
        grid-row: 2;
        font-size: 13px;
      }

      .module-meta {
        grid-column: 2 / 4;
        font-size: 12px;
      }

      .module-status {
        margin-left: 0;
        margin-right: 6px;
      }

      .module-grid,
      .coverage-list {
        grid-template-columns: 1fr;
      }

      .options,
      .options.two {
        grid-template-columns: 1fr;
      }

      .option {
        min-height: 118px;
      }

      .option.has-visual {
        min-height: 184px;
        grid-template-columns: auto 1fr;
        grid-template-rows: 1fr;
        text-align: left;
      }

      .visual-card {
        width: 112px;
      }

      .word-main {
        font-size: 34px;
      }

      .word-sub {
        font-size: 22px;
      }

      .read-card .target-line {
        font-size: 38px;
      }

      .dubbing-stage {
        box-shadow: 4px 4px 0 rgba(33, 48, 68, 0.88);
      }

      .dubbing-screen {
        min-height: 360px;
      }

      .dubbing-screen .scene-art {
        min-height: 360px;
      }

      .dubbing-screen .scene-art svg {
        height: 360px;
      }

      .caption-overlay {
        left: 10px;
        right: 10px;
        bottom: 10px;
      }

      .caption-main {
        grid-template-columns: 52px 1fr;
        grid-template-rows: auto auto;
        gap: 8px;
        padding: 10px;
        border-radius: 18px;
      }

      .caption-main .caption-text {
        grid-column: 1 / -1;
        grid-row: 2;
        text-align: center;
      }

      .caption-main .role-chip {
        grid-column: 1;
        grid-row: 1;
      }

      .role-chip {
        width: 52px;
        height: 52px;
        min-width: 52px;
        font-size: 28px;
      }

      .caption-text .subtitle-line {
        font-size: clamp(28px, 7.2vw, 38px);
        overflow-wrap: normal;
        word-break: keep-all;
      }

      .caption-line {
        justify-content: center;
        gap: 7px;
      }

      .caption-tools {
        width: 100%;
        justify-content: center;
      }

      .caption-translation {
        font-size: 13px;
      }

      .caption-focus {
        display: flex;
        justify-content: center;
        max-height: 31px;
        overflow: hidden;
      }

      .caption-focus .focus-chip {
        font-size: 13px;
        padding: 4px 7px;
      }

      .dub-console {
        padding: 18px 16px 18px;
      }

      .dub-console .record-orb {
        width: 118px;
        height: 118px;
        font-size: 46px;
      }

      .dub-side-btn {
        min-height: 54px;
        font-size: 16px;
        padding: 0 8px;
        gap: 3px;
      }

      .dub-playback-btn {
        min-width: 74px;
        min-height: 46px;
        font-size: 14px;
        padding: 0 8px;
      }

      .record-main {
        min-width: 118px;
        gap: 8px;
      }

      .record-helper strong {
        font-size: 17px;
      }

      .dub-hint {
        font-size: 13px;
      }

      .score-top {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .score-badge {
        width: 118px;
        height: 118px;
      }

      .score-badge span {
        padding-bottom: 22px;
      }

      .kid-score-message {
        font-size: 18px;
      }

      .scene-art {
        min-height: 190px;
      }

      .scene-art svg {
        height: 190px;
      }

      .caption-strip {
        grid-template-columns: 1fr;
      }

      .speech-bubble::before {
        display: none;
      }

      .role-avatar {
        width: 64px;
        height: 64px;
      }

      .dub-steps {
        grid-template-columns: 1fr 1fr;
      }

      .subtitle-line {
        font-size: 34px;
      }

      .record-panel {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .record-tools,
      .feedback-actions,
      .score-top {
        justify-content: center;
      }

      .lesson-progress {
        text-align: left;
      }

      .lesson-body {
        padding: 16px;
        padding-bottom: 166px;
        min-height: 420px;
      }

      .lesson-actions {
        grid-template-columns: 1fr 1fr;
      }

      .lesson-actions .next-action {
        grid-column: 1 / -1;
      }

    }
  </style>
</head>
<body>
  <main class="app">
    <section id="homeScreen" class="screen active" aria-labelledby="homeTitle">
      <div class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">A</div>
          <div>
            <h1 id="homeTitle">Unit 1-4 复习闯关</h1>
            <p class="subtitle">听一听，选一选，说一说，每天完成一小关。</p>
          </div>

    const CHILD_INTERNAL_TEXT_RE = /(internal_[\w-]+|failed-ai-content|raw content|api key|secret|\.env|npm start|xfyun|讯飞|Chrome|Edge|sessionId|教材词库|正式产品|技术提示|debug|provider|fallback lesson used|saved to)/i;
    const CHILD_NON_VISIBLE_KEYS_RE = /^(id|req_id|module_id|type|priority|coverage_status|difficulty_level|version|date|image_key|scene_key|letter|is_optional|estimated_minutes)$/i;
    const CHILD_INTERNAL_KEYS_RE = /(^|_)(ids?|covered_by|requirement_ids|target_requirement_ids|debug|raw|attempts|api|key|secret|token|session_id|audio_base64|audio_stats|image_url)$/i;

    function cleanChildFacingText(value, key = "") {
      const text = String(value ?? "").trim();
      if (!text) return "";
      if (/notes?$/i.test(key)) return "";
      if (CHILD_INTERNAL_TEXT_RE.test(text)) return "";
      return text.replace(/\bR_AUTO_[A-Z_]+\b/g, "").trim();
    }

    function sanitizeLessonForChild(value, key = "") {
      if (Array.isArray(value)) {
        const cleaned = value.map((item) => sanitizeLessonForChild(item, key));
        return /notes?$/i.test(key) ? [] : cleaned;
      }
      if (!value || typeof value !== "object") {
        if (typeof value === "string" && !CHILD_NON_VISIBLE_KEYS_RE.test(key) && !CHILD_INTERNAL_KEYS_RE.test(key)) {
          return cleanChildFacingText(value, key);
        }
        return value;
      }
      const output = {};
      Object.entries(value).forEach(([childKey, childValue]) => {
        if (CHILD_INTERNAL_KEYS_RE.test(childKey) && !["requirement_ids", "target_requirement_ids"].includes(childKey)) return;
        output[childKey] = sanitizeLessonForChild(childValue, childKey);
      });
      return output;
    }

    function getTrackDebugInfo(stream) {
      return (stream?.getAudioTracks?.() || []).map((track) => ({
        kind: track.kind,
        enabled: track.enabled,
        muted: track.muted,
        readyState: track.readyState,
        label: track.label || "",
        settings: track.getSettings ? track.getSettings() : {}
      }));
    }

    function isLikelyVirtualInput(label = "") {
      return /todesk|virtual|voicemeeter|cable|stereo mix|立体声|混音|虚拟/i.test(String(label));
    }

    function buildAudioConstraints(deviceId = "") {
      return {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        ...(deviceId ? { deviceId: { exact: deviceId } } : {})
      };
    }

    async function refreshAudioInputDevices() {
      if (!navigator.mediaDevices?.enumerateDevices) return [];
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        recordingState.audioInputDevices = devices
          .filter((device) => device.kind === "audioinput")
          .map((device, index) => ({
            deviceId: device.deviceId,
            groupId: device.groupId,
            label: device.label || `麦克风 ${index + 1}`,
            isVirtual: isLikelyVirtualInput(device.label || "")
          }));
        renderMicDevicePanel();
        return recordingState.audioInputDevices;
      } catch {
        return recordingState.audioInputDevices || [];
      }
    }

    function getActiveTrackInfo() {
      return recordingState.activeTrackInfo?.[0] || null;
    }

    function getInputIssueMessage(trackInfo = getActiveTrackInfo()) {
      const label = recordingState.activeInputLabel || trackInfo?.label || "";
      if (trackInfo?.muted) {
        return `当前输入是 ${label || "一个被静音的麦克风"}，浏览器没有收到声音。请切换到真实麦克风。`;
      }
      if (isLikelyVirtualInput(label)) {
        return `当前输入是 ${label}，这通常不是孩子说话的麦克风。请切换到真实麦克风。`;
      }
      return "";
    }

    function chooseRealAudioInput(currentTrackInfo = getActiveTrackInfo()) {
      const currentDeviceId = currentTrackInfo?.settings?.deviceId || "";
      return (recordingState.audioInputDevices || []).find((device) =>
        device.deviceId
        && device.deviceId !== "default"
        && device.deviceId !== "communications"
        && device.deviceId !== currentDeviceId
        && !device.isVirtual
      ) || null;
    }

    function renderMicDevicePanel() {
      const panel = document.getElementById("micDevicePanel");
      const select = document.getElementById("micDeviceSelect");
      const hint = document.getElementById("micDeviceHint");
      if (!panel || !select || !hint) return;
      const devices = recordingState.audioInputDevices || [];
      if (!devices.length) {
        panel.hidden = true;
        return;
      }
      panel.hidden = false;
      const selected = recordingState.selectedAudioDeviceId || getActiveTrackInfo()?.settings?.deviceId || "";
      select.innerHTML = devices.map((device) => {
        const label = `${device.label}${device.isVirtual ? "（虚拟/可能无声）" : ""}`;
        const chosen = device.deviceId === selected ? " selected" : "";
        return `<option value="${escapeHtml(device.deviceId)}"${chosen}>${escapeHtml(label)}</option>`;
      }).join("");
      select.onchange = () => {
        recordingState.selectedAudioDeviceId = select.value;
        localStorage.setItem("kids-english-audio-device-id", select.value);
        hint.textContent = "已切换。请重新点麦克风录一次。";

      hint.textContent = issue || `当前：${recordingState.activeInputLabel || "浏览器默认麦克风"}`;
    }

    async function getRecordingStream(item) {
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: buildAudioConstraints(recordingState.selectedAudioDeviceId)
        });
      } catch (error) {
        if (!recordingState.selectedAudioDeviceId) throw error;
        logRecordingEvent("selected_audio_input_failed", item, {
          deviceId: recordingState.selectedAudioDeviceId,
          name: error?.name || "",
          message: error?.message || ""
        });
        recordingState.selectedAudioDeviceId = "";
        localStorage.removeItem("kids-english-audio-device-id");
        stream = await navigator.mediaDevices.getUserMedia({
          audio: buildAudioConstraints()
        });
      }
      let trackInfo = getTrackDebugInfo(stream);
      recordingState.activeTrackInfo = trackInfo;
      recordingState.activeInputLabel = trackInfo[0]?.label || "";
      await refreshAudioInputDevices();

      const issue = getInputIssueMessage(trackInfo[0]);
      const fallback = issue ? chooseRealAudioInput(trackInfo[0]) : null;
      if (!fallback) return stream;

      stream.getTracks().forEach((track) => track.stop());
      logRecordingEvent("switch_audio_input_from_virtual", item, {
        from: trackInfo[0]?.label || "",
        to: fallback.label
      });
      recordingState.selectedAudioDeviceId = fallback.deviceId;
      localStorage.setItem("kids-english-audio-device-id", fallback.deviceId);
      const fallbackStream = await navigator.mediaDevices.getUserMedia({
        audio: buildAudioConstraints(fallback.deviceId)
      });
      trackInfo = getTrackDebugInfo(fallbackStream);
      recordingState.activeTrackInfo = trackInfo;
      recordingState.activeInputLabel = trackInfo[0]?.label || fallback.label || "";
      await refreshAudioInputDevices();
      return fallbackStream;
    }

    function refreshSpeechVoices() {
      if (!("speechSynthesis" in window)) return [];
      speechVoices = speechSynthesis.getVoices?.() || [];
      return speechVoices;
    }

    function warmSpeechEngine() {
      if (!("speechSynthesis" in window)) return;
      refreshSpeechVoices();
      try {
        speechSynthesis.resume();
      } catch {}
    }

    function pickSpeechVoice(lang) {
      const voices = speechVoices.length ? speechVoices : refreshSpeechVoices();
      const target = String(lang || "en-US").toLowerCase();
      const prefix = target.split("-")[0];
      return voices.find((voice) => voice.lang?.toLowerCase() === target)
        || voices.find((voice) => voice.lang?.toLowerCase().startsWith(`${prefix}-`))
        || null;
    }

    if ("speechSynthesis" in window) {
      refreshSpeechVoices();
      speechSynthesis.onvoiceschanged = refreshSpeechVoices;
      setTimeout(refreshSpeechVoices, 120);
      setTimeout(refreshSpeechVoices, 900);
      window.addEventListener("pointerdown", warmSpeechEngine, { once: true, capture: true });
    }

    function getAudioContext() {
      if (!audioContext) {
        const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (AudioContextCtor) audioContext = new AudioContextCtor();
      }
      return audioContext;
    }

    function playTone(frequency, duration, delay = 0, type = "sine", gainValue = 0.08) {
      const ctx = getAudioContext();
      if (!ctx) return;
      const start = ctx.currentTime + delay;
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      oscillator.connect(gain).connect(ctx.destination);
      oscillator.start(start);
      oscillator.stop(start + duration + 0.02);
    }

    function playSuccessSound() {
      playTone(523, 0.13, 0, "triangle", 0.08);
      playTone(659, 0.13, 0.1, "triangle", 0.08);
      playTone(784, 0.18, 0.2, "triangle", 0.08);
    }

    function playTryAgainSound() {
      playTone(392, 0.14, 0, "sine", 0.07);
      playTone(330, 0.22, 0.13, "sine", 0.06);
    }

    function detectSpeechLang(text) {
      return /[\u4e00-\u9fff]/.test(text) ? "zh-CN" : "en-US";
    }

    function speak(text, btn, lang, options = {}) {
      if (!text || !("speechSynthesis" in window)) return;
      warmSpeechEngine();
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = lang || detectSpeechLang(text);
      utterance.rate = utterance.lang === "zh-CN" ? 0.92 : 0.78;
      utterance.pitch = 1.05;
      const voice = pickSpeechVoice(utterance.lang);
      if (voice) utterance.voice = voice;
      const requestedAt = performance.now();
      let done = false;
      const resumeTimers = [0, 120, 360, 800].map((delay) => setTimeout(() => {
        if (!done) {
          try {
            speechSynthesis.resume();
          } catch {}
        }
      }, delay));
      const clear = () => {
        done = true;
        resumeTimers.forEach(clearTimeout);
        if (btn) btn.classList.remove("playing");
      };
      if (btn) btn.classList.add("playing");
      utterance.onstart = () => {
        options.onstart?.({ delayMs: Math.round(performance.now() - requestedAt), voice: utterance.voice?.name || "" });
      };
      utterance.onend = () => {
        clear();
        options.onend?.();
      };
      utterance.onerror = (event) => {
        clear();
        options.onerror?.(event);
      };
      speechSynthesis.speak(utterance);
    }

    function speakQueue(parts) {
      if (!("speechSynthesis" in window)) return;
      warmSpeechEngine();
      speechSynthesis.cancel();
      const queue = parts.filter((part) => part && part.text);
      const next = () => {
        const part = queue.shift();
        if (!part) return;
        const utterance = new SpeechSynthesisUtterance(part.text);
        utterance.lang = part.lang || detectSpeechLang(part.text);
        utterance.rate = utterance.lang === "zh-CN" ? 0.92 : 0.78;
        utterance.pitch = 1.05;
        const voice = pickSpeechVoice(utterance.lang);
        if (voice) utterance.voice = voice;
        utterance.onend = next;
        utterance.onerror = next;
        speechSynthesis.speak(utterance);
      };
      next();
    }

    function normalizeSpeech(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function lcsLength(a, b) {
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 1; i <= a.length; i += 1) {
        for (let j = 1; j <= b.length; j += 1) {
          dp[i][j] = a[i - 1] === b[j - 1]
            ? dp[i - 1][j - 1] + 1
            : Math.max(dp[i - 1][j], dp[i][j - 1]);
        }
      }
      return dp[a.length][b.length];
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      const chunkSize = 0x8000;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        const chunk = bytes.subarray(i, i + chunkSize);
        binary += String.fromCharCode(...chunk);
      }
      return btoa(binary);
    }

    function downsampleTo16k(input, sourceRate) {
      const targetRate = 16000;
      if (sourceRate === targetRate) return input;
      const ratio = sourceRate / targetRate;
      const length = Math.round(input.length / ratio);
      const output = new Float32Array(length);
      let inputOffset = 0;
      for (let i = 0; i < length; i += 1) {
        const nextOffset = Math.round((i + 1) * ratio);
        let sum = 0;
        let count = 0;
        for (let j = inputOffset; j < nextOffset && j < input.length; j += 1) {
          sum += input[j];
          count += 1;
        }
        output[i] = count ? sum / count : 0;
        inputOffset = nextOffset;
      }
      return output;
    }

    function encodeWavPcm16(samples, sampleRate = 16000) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);
      const writeText = (offset, text) => {
        for (let i = 0; i < text.length; i += 1) view.setUint8(offset + i, text.charCodeAt(i));
      };
      writeText(0, "RIFF");
      view.setUint32(4, 36 + samples.length * 2, true);
      writeText(8, "WAVE");
      writeText(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeText(36, "data");
      view.setUint32(40, samples.length * 2, true);
      let offset = 44;
      for (let i = 0; i < samples.length; i += 1, offset += 2) {
        const sample = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
      }
      return buffer;
    }

    function getAudioStats(samples, durationMs) {
      if (!samples.length) return { durationMs, rms: 0, peak: 0, activeRatio: 0 };
      let sumSquares = 0;
      let peak = 0;
      let active = 0;
      for (const sample of samples) {
        const abs = Math.abs(sample);
        sumSquares += sample * sample;
        if (abs > peak) peak = abs;
        if (abs > 0.018) active += 1;
      }
      return {
        durationMs,
        rms: Number(Math.sqrt(sumSquares / samples.length).toFixed(4)),
        peak: Number(peak.toFixed(4)),
        activeRatio: Number((active / samples.length).toFixed(4))
      };
    }

    function getRecordingSeconds(item) {
      const target = item.pronunciation_target || item.text || "";
      const wordCount = normalizeSpeech(target).split(" ").filter(Boolean).length;
      return Math.max(6, Math.min(12, Math.ceil(wordCount * 1.1 + 3)));
    }

    function getMicDiagnostic(stats = {}) {
      const durationMs = Number(stats.durationMs || 0);
      const rms = Number(stats.rms || 0);
      const peak = Number(stats.peak || 0);
      const activeRatio = Number(stats.activeRatio || 0);
      const inputLabel = stats.inputLabel || recordingState.activeInputLabel || "";
      if (stats.inputMuted || stats.inputVirtual || isLikelyVirtualInput(inputLabel)) {
        return {
          level: "bad",
          title: "麦克风选错啦",
          detail: `当前录到的是 ${inputLabel || "虚拟/静音输入"}，不是孩子说话的真实麦克风。`
        };
      }
      if (durationMs > 0 && durationMs < 650) {
        return {
          level: "bad",
          title: "录音太短",
          detail: "还没收到完整句子。跟着原声读完整。"
        };
      }
      if (rms < 0.0045 || peak < 0.015 || activeRatio < 0.012) {
        return {
          level: "bad",
          title: "声音太小",
          detail: "后端几乎没有收到人声。靠近麦克风，检查输入设备。"
        };
      }
      if (rms < 0.012 || activeRatio < 0.06) {
        return {
          level: "warn",
          title: "声音偏小",
          detail: "收到声音了，但可以再大一点。"
        };
      }
      return {
        level: "good",
        title: "声音收到啦",
        detail: "可以送去讯飞评分。"
      };
    }

    function renderMicDiagnostic(stats, diagnostics) {
      const el = document.getElementById("micDiagnostics");
      if (!el) return;
      const source = diagnostics || getMicDiagnostic(stats);
      const safeStats = stats || {};
      const activePercent = Math.round(Number(safeStats.activeRatio || 0) * 100);
      const duration = Math.round(Number(safeStats.durationMs || 0) / 100) / 10;
      const inputLabel = safeStats.inputLabel || recordingState.activeInputLabel || "";
      const inputWarning = getInputIssueMessage() || (safeStats.inputMuted || safeStats.inputVirtual ? source.detail : "");
      el.className = `mic-diagnostic ${source.level}`;
      el.innerHTML = `
        <strong>${source.title}</strong>
        <span>${source.detail}</span>
        ${inputLabel ? `<small>当前麦克风：${escapeHtml(inputLabel)}</small>` : ""}
        ${inputWarning ? `<span class="mic-input-warning">${escapeHtml(inputWarning)}</span>` : ""}
        <small>家长参考：时长 ${duration || 0}s · 音量 ${safeStats.rms || 0} · 有声 ${activePercent}%</small>
      `;
      renderMicDevicePanel();
    }

    async function blobToWavBase64(blob) {
      const ctx = getAudioContext();
      if (!ctx) throw new Error("当前浏览器不能处理录音音频。");
      if (ctx.state === "suspended") await ctx.resume();
      const rawBuffer = await blob.arrayBuffer();
      const audioBuffer = await ctx.decodeAudioData(rawBuffer.slice(0));
      const channelCount = audioBuffer.numberOfChannels || 1;
      const mono = new Float32Array(audioBuffer.length);
      for (let channel = 0; channel < channelCount; channel += 1) {
        const data = audioBuffer.getChannelData(channel);
        for (let i = 0; i < data.length; i += 1) mono[i] += data[i] / channelCount;
      }
      const samples16k = downsampleTo16k(mono, audioBuffer.sampleRate);
      const wavBuffer = encodeWavPcm16(samples16k, 16000);
      const durationMs = Math.round((samples16k.length / 16000) * 1000);
      const activeTrack = getActiveTrackInfo();
      const audioStats = {
        ...getAudioStats(samples16k, durationMs),
        inputLabel: recordingState.activeInputLabel || activeTrack?.label || "",
        inputMuted: Boolean(activeTrack?.muted),
        inputVirtual: isLikelyVirtualInput(recordingState.activeInputLabel || activeTrack?.label || "")
      };
      return {
        audioBase64: arrayBufferToBase64(wavBuffer),
        durationMs,
        audioStats,
        audioMeta: {
          rawBytes: rawBuffer.byteLength,
          wavBytes: wavBuffer.byteLength,
          sampleRate: audioBuffer.sampleRate,
          channels: channelCount,
          inputLabel: audioStats.inputLabel,
          inputMuted: audioStats.inputMuted,
          inputVirtual: audioStats.inputVirtual,
          inputDeviceId: activeTrack?.settings?.deviceId || ""
        }
      };
    }

    async function assessPronunciationWithApi(audioBlob, item) {
      const target = item.pronunciation_target || item.text;
      const audio = await blobToWavBase64(audioBlob);
      recordingState.lastAudioDiagnostics = audio.audioStats;
      renderMicDiagnostic(audio.audioStats);
      if (audio.durationMs > 15000) {
        logRecordingEvent("audio_too_long_before_assess", item, {
          durationMs: audio.durationMs,
          audioStats: audio.audioStats,
          audioMeta: audio.audioMeta
        });
        const error = new Error("录音太长了，这次先不评分。请点麦克风重新配音，读完再点麦克风结束。");
        error.code = "AUDIO_TOO_LONG";
        error.audioDiagnostics = audio.audioStats;
        throw error;
      }
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);
      let response;
      try {
        response = await fetch(PRONUNCIATION_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: controller.signal,
          body: JSON.stringify({
            questionId: item.id,
            referenceText: target,
            focusWords: item.pronunciation_focus || [],
            browserTranscript: recordingState.transcript || "",
            durationMs: audio.durationMs,
            audioStats: audio.audioStats,
            audioMeta: audio.audioMeta,
            audioBase64: audio.audioBase64
          })
        });
      } catch (error) {
        if (error?.name === "AbortError") {
          const timeoutError = new Error("评分太久了，录音已保存，可以先做下一题。");
          timeoutError.code = "ASSESS_TIMEOUT";
          timeoutError.audioDiagnostics = audio.audioStats;
          throw timeoutError;
        }
        throw error;
      } finally {
        clearTimeout(timeout);
      }
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload.ok) {
        const error = new Error(payload.message || "语音评测服务没有返回结果。");
        error.code = payload.code || "";
        error.audioDiagnostics = payload.audioDiagnostics || audio.audioStats;
        throw error;
      }
      return {
        assessmentId: payload.result.assessmentId || "",
        score: payload.result.score,
        stars: payload.result.stars,
        transcript: payload.result.transcript || "",
        matchedText: payload.result.matchedText || payload.result.transcript || "",
        browserTranscript: payload.result.browserTranscript || recordingState.transcript || "",
        scoringMode: payload.result.scoringMode || "target_alignment",
        alignmentNote: payload.result.alignmentNote || "",
        matchedFocusWords: payload.result.matchedFocusWords || [],
        missingFocusWords: payload.result.missingFocusWords || [],
        message: payload.result.message || "评分完成啦。",
        wordScores: payload.result.wordScores || [],
        matchedWords: payload.result.matchedWords || 0,
        rawMatchedWords: payload.result.rawMatchedWords || payload.result.matchedWords || 0,
        totalWords: payload.result.totalWords || 0,
        accuracy: payload.result.accuracy,
        fluency: payload.result.fluency,
        completeness: payload.result.completeness,
        recognitionScore: payload.result.recognitionScore,
        pronunciationScore: payload.result.pronunciationScore,
        effortScore: payload.result.effortScore,
        provider: payload.result.provider || "xfyun-ise",
        elapsedMs: payload.result.rawSummary?.elapsedMs,
        sendElapsedMs: payload.result.rawSummary?.sendElapsedMs,
        audioStats: audio.audioStats
      };
    }

    function scorePronunciation(target, spoken, focusWords = []) {
      const targetWords = normalizeSpeech(target).split(" ").filter(Boolean);
      const spokenWords = normalizeSpeech(spoken).split(" ").filter(Boolean);
      const focus = focusWords.map(normalizeSpeech).filter(Boolean);
      if (!targetWords.length) {
        return { score: 70, stars: 4, transcript: spoken, message: "录音完成啦，继续保持。", wordScores: [], matchedWords: 0, totalWords: 0, unclear: false };
      }
      if (!spokenWords.length) {
        return {
          score: null,
          stars: 0,
          transcript: spoken,
          message: "录音完成了，但浏览器没有识别出文字。这通常是麦克风或环境声音问题，不是你读错啦。可以听回放，或者再配一次。",
          wordScores: targetWords.map((word) => ({ word, status: "unheard" })),
          matchedWords: 0,
          totalWords: targetWords.length,
          unclear: true
        };
      }
      const matched = targetWords.filter((word) => spokenWords.includes(word)).length;
      const focusMatched = focus.length ? focus.filter((word) => spokenWords.includes(word)).length : matched;
      const wordScore = matched / targetWords.length;
      const focusScore = focus.length ? focusMatched / focus.length : wordScore;
      const orderScore = lcsLength(targetWords, spokenWords) / targetWords.length;
      const score = Math.max(0, Math.min(100, Math.round(wordScore * 48 + focusScore * 32 + orderScore * 20)));
      const stars = Math.max(1, Math.min(5, Math.round(score / 20)));
      const wordScores = targetWords.map((word, index) => {
        if (spokenWords[index] === word) return { word, status: "good" };
        if (spokenWords.includes(word)) return { word, status: "ok" };
        return { word, status: "miss" };
      });
      const message = score >= 85
        ? "读得很清楚，节奏也很棒！"
        : score >= 65
          ? "读得不错，再把重点词读响一点。"
          : "已经开口啦，很棒！再听一遍老师读，然后再试一次。";
      return { score, stars, transcript: spoken, message, wordScores, matchedWords: matched, totalWords: targetWords.length, unclear: false };
    }

    function clearRecordingTimers() {
      if (recordingState.timer) clearInterval(recordingState.timer);
      recordingState.timer = null;
      if (recordingState.countdownTimer) clearInterval(recordingState.countdownTimer);
      recordingState.countdownTimer = null;
      if (recordingState.autoStopTimer) clearTimeout(recordingState.autoStopTimer);
      recordingState.autoStopTimer = null;
      clearScoringWaitTimer();
      if (recordingState.recognition) {
        try { recordingState.recognition.stop(); } catch {}
        recordingState.recognition = null;
      }
    }

    function discardActiveRecording(reason = "discard") {
      clearRecordingTimers();
      const recorder = recordingState.mediaRecorder;
      if (recorder) {
        recorder.ondataavailable = null;
        recorder.onstop = null;
        recorder.onerror = null;
        try {
          if (recorder.state !== "inactive") recorder.stop();
        } catch {}
      }
      if (recordingState.stream) {
        recordingState.stream.getTracks().forEach((track) => track.stop());
        recordingState.stream = null;
      }
      recordingState.mediaRecorder = null;
      recordingState.recordingStarted = false;
      recordingState.recordingStartedAt = 0;
      if (reason) logRecordingEvent("discard_recording", null, { reason });
    }

    function stopActiveRecording() {
      clearRecordingTimers();
      const recorder = recordingState.mediaRecorder;
      if (recorder && recorder.state !== "inactive" && recordingState.recordingStarted) {
        try {
          recorder.stop();
          return;
        } catch (error) {
          logRecordingEvent("recorder_stop_failed", null, {
            name: error?.name || "",
            message: error?.message || ""
          });
        }
      }
      discardActiveRecording("stop_before_started");
    }

    function displayIcon(value, fallback = "⭐") {
      const raw = String(value || "").trim();
      const key = raw.toLowerCase();
      const iconMap = {
        ear: "🎧",
        listen: "🎧",
        headphone: "🎧",
        headphones: "🎧",

    function childSafeNote(value) {
      const text = String(value || "").trim();
      if (/fallback lesson used|raw content|failed-ai-content|ai returned|saved to|npm start|\.env|api key|secret/i.test(text)) return "";
      return text;
    }

    function renderHome() {
      const doneCount = getDoneCount();
      const total = LESSON.modules.length;
      const totalItems = LESSON.modules.reduce((sum, module) => sum + module.items.length, 0);
      document.getElementById("homeProgressText").textContent = `${doneCount}/${total}`;
      document.getElementById("homeProgressFill").style.width = `${(doneCount / total) * 100}%`;
      document.getElementById("badges").innerHTML = [
        `📚 ${LESSON.topic}`,
        "🧒 今日闯关",
        `✓ ${totalItems}题`
      ].map((item) => `<span class="badge">${escapeHtml(item)}</span>`).join("");

      moduleGrid.innerHTML = LESSON.modules.map((module, index) => {
        const done = getModuleDone(module);
        const itemDone = module.items.filter((item) => state.completed[item.id]).length;
        return `
          <button class="module-card ${done ? "done" : ""}" type="button" onclick="openModule(${index})">
            <span class="module-top">
              <span class="module-icon">${escapeHtml(displayIcon(module.icon, "⭐"))}</span>
              <span class="module-status">${done ? "完成" : `${itemDone}/${module.items.length}`}</span>
            </span>
            <span class="module-name">${escapeHtml(module.title)}</span>
            <span class="module-goal">${escapeHtml(module.goal)}</span>
            <span class="module-meta">
              <span>⏱ ${module.estimated_minutes}分钟</span>
              <span>📝 ${module.items.length}题</span>
            </span>
          </button>
        `;
      }).join("");

      renderCoverage();
      if (doneCount === total) {
        document.getElementById("awardMessage").textContent = LESSON.daily_award.data.message;
        showScreen("award");
      }
    }

    function renderCoverage() {
      const covered = LESSON.atomic_requirements.filter((req) => req.coverage_status === "covered").length;
      document.getElementById("coverageBadge").textContent = `${covered}/${LESSON.atomic_requirements.length}`;
      document.getElementById("coverageSummary").textContent = covered === LESSON.atomic_requirements.length
        ? "老师要求已逐条覆盖"
        : "还有要求需要补题";
      document.getElementById("coverageList").innerHTML = LESSON.atomic_requirements.map((req, index) => `
        <div class="coverage-item">
          <strong>第 ${index + 1} 条 · ${escapeHtml(req.source_text || req.expected_practice || "老师要求")}</strong>
          <span>${req.coverage_status === "covered" ? "已安排到练习里" : "需要重新生成补齐"}</span>
        </div>
      `).join("");
    }

    function openModule(index) {
      state.currentModule = index;
      const module = LESSON.modules[index];
      const firstOpen = module.items.findIndex((item) => !state.completed[item.id]);
      state.currentItem = firstOpen === -1 ? 0 : firstOpen;
      showScreen("lesson");
      renderItem();
      resetLessonScroll();
    }

    function getCurrent() {
      const module = LESSON.modules[state.currentModule];
      return { module, item: module.items[state.currentItem] };
    }

    function renderItem() {
      const { module, item } = getCurrent();
      document.querySelector(".lesson-shell")?.classList.remove("complete");
      state.answered = Boolean(state.completed[item.id]);
      const total = module.items.length;
      const current = state.currentItem + 1;
      const percent = (current / total) * 100;

      document.getElementById("lessonMark").textContent = displayIcon(module.icon, "🎧");
      document.getElementById("lessonTitle").textContent = module.title;
      document.getElementById("lessonSubtitle").textContent = module.goal;
      document.getElementById("moduleTitle").textContent = module.title;
      document.getElementById("moduleGoal").textContent = module.goal;
      document.getElementById("lessonProgress").textContent = `第 ${current}/${total} 题`;
      document.getElementById("lessonProgressFill").style.width = `${percent}%`;
      prevBtn.disabled = state.currentItem === 0;
      nextBtn.disabled = !state.answered;
      nextBtn.textContent = current === total ? "完成本关 ✓" : "下一题 ›";

      if (item.type === "letter_sound_trace") {
        renderLetterItem(item);
      } else if (item.type === "read_aloud") {
        renderReadItem(item);
      } else {
        renderChoiceItem(item);
      }
    }

        mixed_challenge: "混合问答",

        }

        startRecording(item);
      });
