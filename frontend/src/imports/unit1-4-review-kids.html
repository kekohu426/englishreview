    function resetRecordingUi(title, hintText) {
      const recordBtn = document.getElementById("recordBtn");
      const wave = document.getElementById("recordWave");
      const status = document.getElementById("recordStatus");
      const hint = document.getElementById("recordHint");
      if (recordBtn) {
        recordBtn.classList.remove("countdown", "recording");
        recordBtn.textContent = "🎙";
        recordBtn.disabled = false;
        recordBtn.setAttribute("aria-label", "开始录音");
      }
      if (wave) wave.classList.remove("active");
      if (status) status.textContent = title;
      if (hint) hint.textContent = hintText;
    }

    function stopRecordingStreamOnly() {
      const recorder = recordingState.mediaRecorder;
      if (recorder) {
        recorder.ondataavailable = null;
        recorder.onstop = null;
        recorder.onerror = null;
        try {
          if (recorder.state !== "inactive") recorder.stop();
        } catch {}
      }
      if (recordingState.stream) {
        recordingState.stream.getTracks().forEach((track) => track.stop());
        recordingState.stream = null;
      }
      recordingState.mediaRecorder = null;
      recordingState.recordingStarted = false;
      recordingState.recordingStartedAt = 0;
    }

    function handleRecordingStartError(item, error, extra = {}) {
      if (recordingState.countdownTimer) clearInterval(recordingState.countdownTimer);
      recordingState.countdownTimer = null;
      if (recordingState.timer) clearInterval(recordingState.timer);
      recordingState.timer = null;
      if (recordingState.autoStopTimer) clearTimeout(recordingState.autoStopTimer);
      recordingState.autoStopTimer = null;
      stopRecordingStreamOnly();
      resetRecordingUi("录音没有启动", "请家长检查一下麦克风，然后再试一次。");
      nextBtn.disabled = true;
      const message = error?.message || "浏览器没有真正开始录音。";
      logRecordingEvent("recorder_start_failed", item, {
        message,
        name: error?.name || "",
        ...extra
      });
      showFeedback(false, "录音没有启动", "麦克风还没有准备好，请家长检查一下，再录一次。", { retry: true, item });
      playTone(440, 0.12, 0, "sine", 0.05);
      speakQueue([{ text: "录音没有启动。请家长检查一下麦克风，再试一次。", lang: "zh-CN" }]);
    }

    async function startRecording(item) {
      if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
        showFeedback(false, "麦克风打不开", "请家长帮忙换一个支持录音的浏览器，再回来继续。", { retry: false });
        speakQueue([{ text: "麦克风打不开。请家长帮忙检查一下。", lang: "zh-CN" }]);
        return;
      }

      discardActiveRecording("new_recording_requested");
      recordingState.sessionId += 1;
      const sessionId = recordingState.sessionId;
      recordingState.activeItemId = item.id;
      recordingState.chunks = [];
      recordingState.transcript = "";
      recordingState.audioBlob = null;
      recordingState.secondsLeft = getRecordingSeconds(item);
      recordingState.lastAudioDiagnostics = null;
      recordingState.recordingStarted = false;
      recordingState.recordingStartedAt = 0;
      if (recordingState.audioUrl) URL.revokeObjectURL(recordingState.audioUrl);
      recordingState.audioUrl = "";

      const recordBtn = document.getElementById("recordBtn");
      const wave = document.getElementById("recordWave");
      const status = document.getElementById("recordStatus");
      const hint = document.getElementById("recordHint");
      const scoreCard = document.getElementById("scoreCard");
      const feedback = document.getElementById("feedback");
      const playBtn = document.getElementById("playRecordBtn");
      const micDiagnostics = document.getElementById("micDiagnostics");
      const steps = [...document.querySelectorAll("#dubSteps .dub-step")];
      if (scoreCard) scoreCard.classList.remove("show", "scoring");
      if (feedback) feedback.classList.remove("show", "good", "try");
      if (recordBtn) {
        recordBtn.disabled = true;
        recordBtn.setAttribute("aria-label", "正在准备录音");
      }
      if (playBtn) playBtn.disabled = true;
      if (micDiagnostics) {
        micDiagnostics.className = "mic-diagnostic";
        micDiagnostics.innerHTML = "";
      }

      try {
        speechSynthesis.cancel();
        logRecordingEvent("get_user_media_start", item, {
          protocol: window.location.protocol,
          host: window.location.host
        });
        const stream = await getRecordingStream(item);
        recordingState.stream = stream;
        const trackInfo = getTrackDebugInfo(stream);
        recordingState.activeTrackInfo = trackInfo;
        recordingState.activeInputLabel = trackInfo[0]?.label || recordingState.activeInputLabel || "";
        renderMicDevicePanel();
        logRecordingEvent("get_user_media_success", item, { tracks: trackInfo });
        const audioTracks = stream.getAudioTracks();
        if (!audioTracks.length) {
          throw new Error("浏览器没有返回麦克风音频轨道。");
        }
        if (!audioTracks.some((track) => track.enabled && track.readyState === "live")) {
          throw new Error("麦克风轨道不是 live 状态。");
        }
        const mimeType = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4"]
          .find((type) => window.MediaRecorder.isTypeSupported?.(type));
        const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
        recordingState.mediaRecorder = recorder;
        recorder.ondataavailable = (event) => {
          if (sessionId !== recordingState.sessionId) return;
          if (event.data && event.data.size) recordingState.chunks.push(event.data);
        };
        recorder.onstart = () => {
          if (sessionId !== recordingState.sessionId) return;
          recordingState.recordingStarted = true;
          recordingState.recordingStartedAt = Date.now();
          logRecordingEvent("recorder_started", item, {
            mimeType: recorder.mimeType || mimeType || "",
            tracks: getTrackDebugInfo(stream)
          });
        };
        recorder.onerror = (event) => handleRecordingStartError(item, event.error || new Error("MediaRecorder 出错。"), {
          recorderState: recorder.state,
          mimeType: recorder.mimeType || mimeType || "",
          tracks: getTrackDebugInfo(stream)
        });
        recorder.onstop = () => finishRecording(item, sessionId);
        nextBtn.disabled = true;
        let count = 3;
        steps.forEach((step, index) => step.classList.toggle("active", index === 1));
        recordBtn.classList.add("countdown");
        recordBtn.textContent = count;
        status.textContent = "准备";
        hint.textContent = "看字幕";
        recordingState.countdownTimer = setInterval(() => {
          count -= 1;
          if (count > 0) {
            recordBtn.textContent = count;
            status.textContent = "准备";
            return;
          }
          clearInterval(recordingState.countdownTimer);
          recordingState.countdownTimer = null;
          try {
            recorder.start(250);
          } catch (error) {
            handleRecordingStartError(item, error, {
              recorderState: recorder.state,
              mimeType: recorder.mimeType || mimeType || "",
              tracks: getTrackDebugInfo(stream)
            });
            return;
          }
          recordingState.recordingStarted = true;
          recordingState.recordingStartedAt = Date.now();
          startSpeechRecognition();
          const maxSeconds = getRecordingSeconds(item);
          const deadline = Date.now() + maxSeconds * 1000;
          recordingState.secondsLeft = maxSeconds;
          steps.forEach((step, index) => step.classList.toggle("active", index === 2));
          recordBtn.classList.remove("countdown");
          recordBtn.classList.add("recording");
          recordBtn.textContent = "🎙";
          recordBtn.disabled = false;
          recordBtn.setAttribute("aria-label", "结束录音");
          wave.classList.add("active");
          status.textContent = "正在录音";
          hint.textContent = "读完再点麦克风";
          recordingState.autoStopTimer = setTimeout(() => {
            logRecordingEvent("auto_stop_recording", item, { maxSeconds, recorderState: recorder.state });
            stopActiveRecording();
          }, maxSeconds * 1000 + 180);
          recordingState.timer = setInterval(() => {
            recordingState.secondsLeft = Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
            status.textContent = `录音中 ${recordingState.secondsLeft}`;
            if (recordingState.secondsLeft <= 0) {
              logRecordingEvent("interval_stop_recording", item, { maxSeconds, recorderState: recorder.state });
              stopActiveRecording();
            }
          }, 250);
        }, 850);
      } catch (error) {
        logRecordingEvent("get_user_media_failed", item, {
          name: error?.name || "",
          message: error?.message || "",
          tracks: getTrackDebugInfo(recordingState.stream)
        });
        stopRecordingStreamOnly();
        resetRecordingUi("没有拿到麦克风", "请允许麦克风权限，再点一次录音。");
        showFeedback(false, "没有拿到麦克风", "请允许麦克风权限，再点一次录音。", { retry: false });
        speakQueue([{ text: "请允许麦克风权限，再点一次录音。", lang: "zh-CN" }]);
      }
    }

    function startSpeechRecognition() {
      if (!SpeechRecognitionCtor) return;
      try {
        const recognition = new SpeechRecognitionCtor();
        recordingState.recognition = recognition;
        recognition.lang = "en-US";
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.onresult = (event) => {
          recordingState.transcript = Array.from(event.results)
            .map((result) => result[0]?.transcript || "")
            .join(" ");
        };
        recognition.onerror = () => {};
        recognition.start();
      } catch {
        recordingState.recognition = null;
      }
    }

    async function finishRecording(item, sessionId = recordingState.sessionId) {
      if (sessionId !== recordingState.sessionId) {
        logRecordingEvent("finish_ignored_stale_session", item, {
          stoppedSessionId: sessionId,
          currentSessionId: recordingState.sessionId
        });
        return;
      }
      const recordedMs = recordingState.recordingStartedAt ? Date.now() - recordingState.recordingStartedAt : 0;
      const reallyStarted = recordingState.recordingStarted && recordedMs >= 650;
      const recordBtn = document.getElementById("recordBtn");
      const wave = document.getElementById("recordWave");
      const status = document.getElementById("recordStatus");
      const hint = document.getElementById("recordHint");
      const playBtn = document.getElementById("playRecordBtn");
      const steps = [...document.querySelectorAll("#dubSteps .dub-step")];
      clearRecordingTimers();
      if (recordingState.stream) {
        recordingState.stream.getTracks().forEach((track) => track.stop());
        recordingState.stream = null;
      }
      if (!reallyStarted) {
        recordingState.mediaRecorder = null;
        recordingState.chunks = [];
        recordingState.audioBlob = null;
        recordingState.recordingStarted = false;
        recordingState.recordingStartedAt = 0;
        resetRecordingUi("还没开始录音", "等倒计时结束，看到“开读”后再说。");
        if (playBtn) playBtn.disabled = true;
        nextBtn.disabled = true;
        logRecordingEvent("finish_before_recording_started", item, { recordedMs });
        showFeedback(false, "还没开始录音", "请点麦克风，等倒计时结束出现“开读”后再说。", { retry: true, item });
        return;
      }
      if (recordBtn) {
        recordBtn.classList.remove("recording");
        recordBtn.textContent = "🎙";
        recordBtn.disabled = true;
        recordBtn.setAttribute("aria-label", "正在打星星");
      }
      if (wave) wave.classList.remove("active");
      if (status) status.textContent = "打星星中";
      if (hint) hint.textContent = "请等一下";
      steps.forEach((step, index) => step.classList.toggle("active", index === 3));
      if (recordingState.chunks.length) {
        const blob = new Blob(recordingState.chunks, { type: recordingState.mediaRecorder?.mimeType || "audio/webm" });
        recordingState.audioBlob = blob;
        recordingState.audioUrl = URL.createObjectURL(blob);
        if (playBtn) playBtn.disabled = false;
      }
      recordingState.mediaRecorder = null;
      recordingState.recordingStarted = false;
      recordingState.recordingStartedAt = 0;

      const target = item.pronunciation_target || item.text;
      if (!recordingState.audioBlob) {
        showAssessmentError(item, new Error("没有录到声音，请再配一次。"));
        return;
      }

      try {
        startScoringWaitUi(item, sessionId);
        const result = await assessPronunciationWithApi(recordingState.audioBlob, item);
        clearScoringWaitTimer();
        if (sessionId !== recordingState.sessionId || getCurrent().item?.id !== item.id) {
          markDubbingLocallyComplete(item);
          logRecordingEvent("scoring_result_ignored_after_navigation", item, {
            assessmentId: result.assessmentId || "",
            score: result.score
          });
          return;
        }
        showScoreResult(result);
        completeDubbingItem(item, result, target);
        if (hint) hint.textContent = "看看星星";
      } catch (error) {
        clearScoringWaitTimer();
        if (sessionId !== recordingState.sessionId || getCurrent().item?.id !== item.id) {
          logRecordingEvent("scoring_error_ignored_after_navigation", item, {
            code: error?.code || "",
            message: error?.message || ""
          });
          return;
        }
        showAssessmentError(item, error);
      }
    }

    function completeDubbingItem(item, result, target) {
      state.completed[item.id] = true;
      state.answered = true;
      saveCompleted();
      nextBtn.disabled = false;
      const recordBtn = document.getElementById("recordBtn");
      if (recordBtn) {
        recordBtn.disabled = false;
        recordBtn.setAttribute("aria-label", "重新录音");
      }

      const feedback = document.getElementById("feedback");
      if (feedback) feedback.classList.remove("show");

      const status = document.getElementById("recordStatus");
      if (status) status.textContent = result.score >= 75 ? "配得很棒" : "配音完成";

      if (result.score >= 75) {
        playSuccessSound();
        burstConfetti(18);
      } else {
        playTone(523, 0.12, 0, "triangle", 0.05);
        playTone(659, 0.12, 0.12, "triangle", 0.05);
      }

      const lead = result.score >= 75
        ? "配得很棒！"
        : "配音完成啦，再配一次可以冲星星。";
      speakQueue([
        { text: lead, lang: "zh-CN" },
        { text: target, lang: "en-US" },
        { text: result.message, lang: "zh-CN" }
      ]);
    }

    function showAssessmentError(item, error) {
      const message = error?.message || "评分服务暂时没有连上。";
      const isMicIssue = error?.code === "AUDIO_TOO_QUIET" || error?.code === "AUDIO_TOO_SHORT";
      const isTooLong = error?.code === "AUDIO_TOO_LONG";
      const isTimeout = error?.code === "ASSESS_TIMEOUT" || /timeout|timed out|太久/.test(message);
      const audioStats = error?.audioDiagnostics || recordingState.lastAudioDiagnostics;
      const isWrongInput = Boolean(audioStats?.inputMuted || audioStats?.inputVirtual || isLikelyVirtualInput(audioStats?.inputLabel || recordingState.activeInputLabel));
      if (audioStats) renderMicDiagnostic(audioStats);
      showScoreResult({
        score: null,
        stars: 0,
        transcript: "",
        message: isTooLong
          ? "录音太长了，这次先不打分。"
          : isWrongInput
          ? "录音没有收到真实麦克风声音，请在家长详情里切换麦克风。"
          : isMicIssue
          ? "录音已保存，但声音太小或太短，这次先不打分。"
          : isTimeout
          ? "录音已保存，评分太慢了，这题先过。"
          : "录音已保存，可以回放；评分服务还没连上。",
        wordScores: [],
        totalWords: normalizeSpeech(item.pronunciation_target || item.text).split(" ").filter(Boolean).length,
        error: message,
        audioStats
      });
      const status = document.getElementById("recordStatus");
      const hint = document.getElementById("recordHint");
      const recordBtn = document.getElementById("recordBtn");
      if (recordBtn) {
        recordBtn.disabled = false;
        recordBtn.setAttribute("aria-label", "重新录音");
      }
      const details = document.querySelector(".score-details");
      if (details && (isWrongInput || isMicIssue)) details.open = true;
      if (status) status.textContent = isTooLong ? "录音太长" : isWrongInput ? "麦克风选错啦" : isMicIssue ? "声音没收清楚" : isTimeout ? "先下一题" : "录音已保存，评分服务未连上。";
      if (hint) hint.textContent = isTooLong
        ? "请重新配音，读完再点麦克风结束。"
        : isWrongInput
        ? "请家长切换真实麦克风。"
        : isMicIssue
        ? "请靠近麦克风，跟着原声读完整。"
        : isTimeout
        ? "评分太慢，先继续。"
        : "语音评分暂时不可用，可以回放录音后再试一次。";
      if (isTimeout) {
        markDubbingLocallyComplete(item);
      } else {
        nextBtn.disabled = true;
      }
      showFeedback(
        false,
        isTooLong ? "录音太长" : isWrongInput ? "麦克风选错啦" : isMicIssue ? "麦克风没收清楚" : isTimeout ? "星星有点慢" : "星星暂时没出来",
        isTooLong ? "这次录得太久啦。重新配一次，读完就点麦克风结束。" : isWrongInput ? "请家长帮忙切换到真实麦克风。" : isMicIssue ? "这不是孩子读错了，是声音太小。听一下回放，再靠近麦克风配一次。" : isTimeout ? "录音已经保存，这题先过，孩子可以继续做下一题。" : "这不是孩子读错了。录音可以回放，请家长检查后再配一次。",
        { retry: true, item }
      );
      playTone(440, 0.12, 0, "sine", 0.05);
      speakQueue([{ text: isTooLong ? "录音太长了。请重新配音，读完再点麦克风结束。" : isWrongInput ? "麦克风选错啦。请家长切换到真实麦克风。" : isMicIssue ? "录音保存了，但是声音太小。靠近麦克风，再配一次。" : isTimeout ? "录音保存啦。星星有点慢，这题先过，继续下一题。" : "录音已经保存啦。星星暂时没出来，请家长检查后再配一次。", lang: "zh-CN" }]);
    }

    function playRecording() {
      if (!recordingState.audioUrl) return;
      const audio = new Audio(recordingState.audioUrl);
      audio.play().catch(() => {});
    }

    function playDubbingOriginal(item, isAutoPlay) {
      const btn = document.getElementById("playOriginalBtn");
      const hint = document.getElementById("recordHint");
      if (!item?.text) return;
      if (hint) hint.textContent = isAutoPlay ? "原声准备中" : "原声播放中";
      speak(item.text, btn, "en-US", {
        onstart: ({ delayMs, voice }) => {
          if (hint) hint.textContent = "听原声";
          if (delayMs > 800) {
            logRecordingEvent("tts_original_slow_start", item, {
              delayMs,
              voice,
              autoPlay: Boolean(isAutoPlay),
              voiceCount: speechVoices.length
            });
          }
        },
        onend: () => {
          if (hint) hint.textContent = "听完，按麦克风";
        },
        onerror: () => {
          if (hint) hint.textContent = "点原声再听一次";
        }
      });
    }

    function getScoreHeadline(result) {
      if (result.pending) return "声音收到啦";
      if (!Number.isFinite(result.score)) return "先听听自己的声音";
      if (result.score >= 90) return "小演员上线啦";
      if (result.score >= 80) return "句子配出来啦";
      if (result.score >= 65) return "勇敢开口，很棒";
      return "再听原声，慢慢来";
    }

    function getKidScoreMessage(result) {
      if (result.pending) {
        return result.message || "声音收到啦，正在打星星。";
      }
      if (!Number.isFinite(result.score)) {
        return result.message || "录音已经在这里，可以先听回放。";
      }
      const matchedText = result.totalWords
        ? `配对 ${result.matchedWords || 0}/${result.totalWords} 个目标词。`
        : "声音收到啦。";
      if ((result.matchedWords || 0) === 0 && result.totalWords) {
        return `${matchedText} 没关系，先听原声，再跟着说一遍。`;
      }
      if (result.score >= 85) return `${matchedText} 读得清楚，继续保持。`;
      if (result.score >= 65) return `${matchedText} 已经配出来啦，再听原声可以冲更多星星。`;
      return `${matchedText} 已经开口啦，先听原声，再慢慢配一次。`;
    }

    function normalizeWordStatus(status) {
      return ["good", "ok", "miss", "practice", "unheard"].includes(status) ? status : "practice";
    }

    function getWordStatusLabel(status) {
      if (status === "good") return "绿色，很棒";
      if (status === "ok") return "黄色，再响一点";
      return "红色，再练一次";
    }

    function showScoreResult(result) {
      const card = document.getElementById("scoreCard");
      if (!card) return;
      card.classList.add("show");
      const hasScore = Number.isFinite(result.score);
      card.classList.toggle("scoring", Boolean(result.pending));
      document.getElementById("scoreNumber").textContent = hasScore ? result.score : "--";
      const headline = document.getElementById("scoreHeadline");
      if (headline) headline.textContent = getScoreHeadline(result);
      document.getElementById("scoreStars").textContent = hasScore
        ? `${"★".repeat(result.stars)}${"☆".repeat(5 - result.stars)}`
        : "☆☆☆☆☆";
      document.getElementById("scoreFill").style.width = `${hasScore ? result.score : result.pending ? 28 : 0}%`;
      document.getElementById("scoreMessage").textContent = getKidScoreMessage(result);
      if (result.audioStats) renderMicDiagnostic(result.audioStats);
      const heardText = result.totalWords
        ? `跟读匹配 ${result.matchedWords || 0}/${result.totalWords} 个词`
        : "已收到配音";
      const metricText = hasScore
        ? `星星评分完成，${heardText}。`
        : result.pending
        ? "正在打星星，稍等会自动更新。"
        : "星星评分暂时不可用，可以回放录音后再试。";
      const missingText = result.missingFocusWords?.length
        ? ` 建议再练：${result.missingFocusWords.join(" / ")}。`
        : "";
      document.getElementById("scoreTranscript").textContent = `${metricText}${missingText}`;
      const wordScoreList = document.getElementById("wordScoreList");
      if (wordScoreList) {
        wordScoreList.innerHTML = (result.wordScores || []).map(({ word, status }) => {
          const safeStatus = normalizeWordStatus(status);
          const label = getWordStatusLabel(safeStatus);
          return `<span class="word-token ${safeStatus}" title="${escapeHtml(label)}" aria-label="${escapeHtml(`${word}: ${label}`)}">${escapeHtml(word)}</span>`;
        }).join("");
      }
    }

    function renderLetterItem(item) {
      const options = buildLetterOptions(item.letter);
      lessonBody.innerHTML = `
        <div class="question-zone">
          <div class="question-kicker"><span class="type-pill">✍️ 字母跟写</span><span class="badge">26字母</span></div>
          <h2 class="question-title">${escapeHtml(item.prompt)}</h2>
          <div class="letter-card">
            <div class="letter-stage" aria-hidden="true">?</div>
            <div class="writing-board">
              <div class="trace-text">${escapeHtml(item.letter)} ${escapeHtml(item.letter.toLowerCase())}</div>
              <p class="question-subtitle">在纸上写：${escapeHtml(item.letter)} ${escapeHtml(item.letter.toLowerCase())}</p>
            </div>
          </div>
          <div class="audio-panel">
            <button class="sound-btn" type="button" id="itemSoundBtn" aria-label="播放字母">🔊</button>
            <div class="sound-label">
              <strong>听字母音</strong>
              <span>选对后，再跟着写。</span>
            </div>
          </div>
          <div class="options">
            ${options.map((letter, index) => `
              <button class="option" type="button" data-index="${index}" data-correct="${letter === item.letter}">
                <span class="answer" style="font-size:42px">${letter}</span>
              </button>
            `).join("")}
          </div>
          ${renderFeedbackShell()}
        </div>
      `;
      document.getElementById("itemSoundBtn").addEventListener("click", (event) => speak(item.audio_text, event.currentTarget));
      [...lessonBody.querySelectorAll(".option")].forEach((btn) => btn.addEventListener("click", () => chooseLetter(btn, item)));
      if (state.completed[item.id]) showStoredDone(item);
      setTimeout(() => speak(item.audio_text, document.getElementById("itemSoundBtn")), 250);
    }

    function buildLetterOptions(letter) {
      const index = LETTERS.indexOf(letter);
      const picks = [letter, LETTERS[(index + 1) % LETTERS.length], LETTERS[(index + 5) % LETTERS.length]];
      return shuffle(picks);
    }

    function renderFeedbackShell() {
      return `
        <div class="feedback" id="feedback">
          <div class="feedback-icon" id="feedbackIcon">✓</div>
          <div class="feedback-copy">
            <strong id="feedbackTitle">回答正确</strong>
            <span id="feedbackText">继续下一题。</span>
            <div class="feedback-actions">
              <button class="mini-btn" type="button" id="feedbackRetry">↺ 再试一次</button>
            </div>
          </div>
        </div>
      `;
    }

    function chooseOption(btn, item) {
      const isCorrect = btn.dataset.correct === "true";
      const buttons = [...lessonBody.querySelectorAll(".option")];
      buttons.forEach((optionBtn) => {
        optionBtn.classList.add("locked");
        if (optionBtn.dataset.correct === "true") optionBtn.classList.add("correct");
      });
      if (!isCorrect) btn.classList.add("wrong");
      completeOpenItem(item, isCorrect, isCorrect ? "答对啦！" : "差一点点", item.explanation, {
        retry: !isCorrect,
        selectedButton: btn
      });
    }

    function chooseLetter(btn, item) {
      const isCorrect = btn.dataset.correct === "true";
      const buttons = [...lessonBody.querySelectorAll(".option")];
      buttons.forEach((optionBtn) => {
        optionBtn.classList.add("locked");
        if (optionBtn.dataset.correct === "true") optionBtn.classList.add("correct");
      });
      if (!isCorrect) btn.classList.add("wrong");
      document.querySelector(".letter-stage").textContent = item.letter;
      completeOpenItem(item, isCorrect, isCorrect ? "选对啦！" : "再听会更准", `这是字母 ${item.letter}，写 ${item.letter} ${item.letter.toLowerCase()}。`, {
        retry: !isCorrect,
        voiceAnswer: item.letter
      });
    }

    function completeOpenItem(item, isCorrect, title, text, options = {}) {
      state.completed[item.id] = true;
      state.answered = true;
      saveCompleted();
      nextBtn.disabled = false;
      showFeedback(isCorrect, title, text, { retry: options.retry, item });
      if (isCorrect) {
        if (options.skipNegativeSound) {
          playTone(523, 0.12, 0, "triangle", 0.05);
          playTone(659, 0.12, 0.12, "triangle", 0.05);
        } else {
          playSuccessSound();
        }
        burstConfetti(16);
        animateWordCard();
      } else {
        if (!options.skipNegativeSound) playTryAgainSound();
        if (options.selectedButton) options.selectedButton.classList.add("wrong");
      }
      speakFeedback(item, isCorrect, title, text, options);
    }

    function speakFeedback(item, isGood, title, text, options = {}) {
      const answer = options.voiceAnswer || getCorrectAnswer(item);
      const knowledge = options.knowledge || getKnowledgeTip(item);
      const parts = [];
      const custom = isGood ? item.success_voice : item.wrong_voice;
      if (custom) {
        parts.push({ text: custom, lang: "zh-CN" });
      } else {
        parts.push({ text: isGood ? "收到你的配音啦！" : "这一遍还没配准。", lang: "zh-CN" });
        if (!isGood && answer) parts.push({ text: "正确答案是", lang: "zh-CN" });
      }
      if (answer && /[a-zA-Z]/.test(answer)) parts.push({ text: answer, lang: "en-US" });
      if (knowledge) parts.push({ text: knowledge, lang: "zh-CN" });
      speakQueue(parts);
    }

    function animateWordCard() {
      const word = lessonBody.querySelector(".option.correct .word-main");
      if (!word) return;
      word.classList.remove("focus-word");
      void word.offsetWidth;
      word.classList.add("focus-word");
    }

    function showFeedback(isGood, title, text, options = {}) {
      const box = document.getElementById("feedback");
      box.className = `feedback show ${isGood ? "good" : "try"}`;
      document.getElementById("feedbackIcon").textContent = isGood ? "✓" : "!";
      document.getElementById("feedbackTitle").textContent = title;
      document.getElementById("feedbackText").textContent = text || "继续下一题。";
      const retry = document.getElementById("feedbackRetry");
      const { item } = getCurrent();
      if (retry) {
        retry.style.display = options.retry ? "inline-flex" : "none";
        retry.onclick = () => {
          delete state.completed[item.id];
          saveCompleted();
          state.answered = false;
          renderItem();
        };
      }
    }

    function showStoredDone(item) {
      [...lessonBody.querySelectorAll(".option")].forEach((optionBtn) => {
        optionBtn.classList.add("locked");
        if (optionBtn.dataset.correct === "true") optionBtn.classList.add("correct");
      });
      if (item.type === "letter_sound_trace") {
        document.querySelector(".letter-stage").textContent = item.letter;
      }
      showFeedback(true, "这题完成啦", item.explanation || item.knowledge_tip || "可以继续下一题。", { retry: false, item });
      nextBtn.disabled = false;
    }

    function nextItem() {
      const { module } = getCurrent();
      if (state.currentItem < module.items.length - 1) {
        state.currentItem += 1;
        renderItem();
        resetLessonScroll();
        return;
      }
      renderModuleComplete(module);
    }

    function renderModuleComplete(module) {
      document.querySelector(".lesson-shell")?.classList.add("complete");
      lessonBody.innerHTML = `
        <div class="completion-panel">
          <div class="big-emoji">${escapeHtml(displayIcon(module.icon, "⭐"))}</div>
          <h2>${escapeHtml(module.title)} 完成！</h2>
          <p>${escapeHtml(module.goal)}，这一关已经拿下。</p>
          <div class="mission-row" style="justify-content:center">
            <button class="text-btn success" type="button" id="nextModuleBtn">下一关 ›</button>
            <button class="text-btn ghost" type="button" id="backHomeFromComplete">⌂ 回首页</button>
          </div>
        </div>
      `;
      nextBtn.disabled = true;
      resetLessonScroll();
      burstConfetti(28);
      document.getElementById("backHomeFromComplete").addEventListener("click", () => {
        renderHome();
        showScreen("home");
      });
      document.getElementById("nextModuleBtn").addEventListener("click", () => {
        const nextIndex = state.currentModule + 1;
        if (nextIndex < LESSON.modules.length) {
          openModule(nextIndex);
        } else {
          renderHome();
        }
      });
    }

    function previousItem() {
      if (state.currentItem > 0) {
        state.currentItem -= 1;
        renderItem();
        resetLessonScroll();
      }
    }

    function resetLessonScroll() {
      requestAnimationFrame(() => {
        lessonScreen.scrollIntoView({ block: "start" });
        window.scrollTo({ top: 0, behavior: "auto" });
      });
    }

    function burstConfetti(count) {
      const box = document.getElementById("confetti");
      const colors = ["#f28a3c", "#3167d8", "#1f9d67", "#ffe070", "#e04b4b", "#2ca6a4"];
      for (let index = 0; index < count; index += 1) {
        const piece = document.createElement("i");
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.background = colors[index % colors.length];
        piece.style.animationDelay = Math.random() * 0.35 + "s";
        piece.style.transform = `rotate(${Math.random() * 180}deg)`;
        box.appendChild(piece);
        setTimeout(() => piece.remove(), 1900);
      }
    }

    document.getElementById("continueBtn").addEventListener("click", () => {
      const nextIndex = LESSON.modules.findIndex((module) => !getModuleDone(module));
      openModule(nextIndex === -1 ? 0 : nextIndex);
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      state.completed = {};
      saveCompleted();
      renderHome();
      showScreen("home");
    });

    document.getElementById("homeBtn").addEventListener("click", () => {
      renderHome();
      showScreen("home");
    });

    prevBtn.addEventListener("click", previousItem);
    nextBtn.addEventListener("click", nextItem);
    document.getElementById("awardHomeBtn").addEventListener("click", () => {
      renderHome();
      showScreen("home");
    });

    document.getElementById("awardAgainBtn").addEventListener("click", () => {
      state.completed = {};
      saveCompleted();
      renderHome();
      showScreen("home");
    });

    renderHome();
  </script>
</body>
</html>
